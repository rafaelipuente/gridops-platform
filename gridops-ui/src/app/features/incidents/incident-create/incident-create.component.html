<div class="page-header">
  <h1>New Incident</h1>
</div>

<form class="card form-card" (ngSubmit)="submit()">
  @if (error) {
    <div class="error-message">{{ error }}</div>
  }

  <div class="form-group">
    <label for="title">Title <span class="required">*</span></label>
    <input id="title" type="text" [(ngModel)]="title" name="title"
           placeholder="Brief description of the incident" required />
  </div>

  <div class="form-group">
    <label for="description">Description</label>
    <textarea id="description" [(ngModel)]="description" name="description"
              rows="4" placeholder="Additional details..."></textarea>
  </div>

  <div class="form-row">
    <div class="form-group">
      <label for="severity">Severity</label>
      <select id="severity" [(ngModel)]="severity" name="severity">
        @for (s of severities; track s) {
          <option [value]="s">{{ s }}</option>
        }
      </select>
    </div>

    <div class="form-group">
      <label for="asset">Related Asset</label>
      <select id="asset" [(ngModel)]="assetId" name="assetId">
        <option [ngValue]="null">None</option>
        @for (a of assets; track a.id) {
          <option [ngValue]="a.id">{{ a.assetTag }} — {{ a.name }}</option>
        }
      </select>
    </div>
  </div>

  <div class="form-actions">
    <a routerLink="/incidents" class="btn btn-secondary">Cancel</a>
    <button type="submit" class="btn btn-primary" [disabled]="!canSubmit">
      @if (submitting) { Creating... } @else { Create Incident }
    </button>
  </div>
</form>
