spring:
  application:
    name: gridops

  datasource:
    url: jdbc:postgresql://localhost:5432/gridops
    username: gridops
    password: gridops
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

gridops:
  jwt:
    secret: ${GRIDOPS_JWT_SECRET:YZJAWe8BsDnrkNTrwhusdv2B4UHK86eHoDTOVLjBI1U=}
    expiration-ms: 86400000
  telemetry:
    soap-url: ${GRIDOPS_TELEMETRY_URL:http://localhost:8081/ws}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
