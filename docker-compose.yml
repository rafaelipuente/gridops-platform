services:
  postgres:
    image: postgres:16-alpine
    container_name: gridops-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: gridops
      POSTGRES_USER: gridops
      POSTGRES_PASSWORD: gridops
    volumes:
      - gridops-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gridops -d gridops"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  gridops-pgdata:
